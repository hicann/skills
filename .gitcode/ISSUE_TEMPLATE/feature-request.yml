name: Requirement|需求建议
description: 当您需要一个新功能特性，需要向社区反馈时，请使用此模板。
title: "[Requirement|需求建议]: "
labels: ["requirement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提交 issues ！请填写如下模板，提供尽可能多的信息，以便我们能更快、更好地解决。

  - type: textarea
    attributes:
      label:
      description: 请描述您的需求详细信息
      value: |
        ####  一、背景信息 （必填）
        <!-- 新需求的功能是什么，解决了什么问题 -->



        ####  二、价值/作用 （必填）
        <!-- 请描述下该需求的价值，应用场景等 -->



        ####  三、设计方案 （选填）
        <!-- 请描述设计的总体思路 -->
  

  

        💡 备注（选填）

    validations:
      required: true